[build]
  functions = "netlify/functions"
  publish = "."

[functions]
  node_bundler = "esbuild"

[functions."ai"]
  timeout = 30

[functions."hubspot"]
  timeout = 10

[functions."mapdata"]
  timeout = 10

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/deals"
  to = "/deal-platform.html"
  status = 200

[[redirects]]
  from = "/hubspot"
  to = "/.netlify/functions/hubspot"
  status = 200
